# Supabase project configuration for the Hadanati platform.
# Apply locally with `supabase start`, deploy with `supabase db push` +
# `supabase functions deploy`. See docs/ARCHITECTURE.md.

project_id = "hadanati"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

# Parents sign in with phone OTP.
[auth.sms]
enable_signup = true
enable_confirmations = true

# Nurseries & admins sign in with email/password.
[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
