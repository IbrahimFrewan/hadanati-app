<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Verification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main">
      <div class="page-head mb-4">
        <h1>Verification queue</h1>
        <p>Review KYC documents and approve or reject nurseries.</p>
      </div>
      <div class="row g-3">
        <div class="col-lg-7">
          <div class="table-wrap" id="listWrap"><div class="spinner-pad">Loading…</div></div>
        </div>
        <div class="col-lg-5">
          <div id="panel"><div class="empty">Select a nursery to review.</div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
  let rows = [], selected = null;
  (async () => { renderSidebar("verification"); await requireAdmin(); load(); })().catch(()=>{});

  async function load() {
    loading("listWrap");
    const { data, error } = await sb.from("nurseries").select("*").eq("status", "pending").order("created_at");
    if (error) return errBox("listWrap", error.message);
    rows = data || [];
    const w = document.getElementById("listWrap");
    if (!rows.length) { w.innerHTML = '<div class="empty">No nurseries awaiting review. 🌿</div>'; document.getElementById("panel").innerHTML = '<div class="empty">All clear.</div>'; return; }
    w.innerHTML = '<table class="tbl"><thead><tr><th>Nursery</th><th>District</th><th>Submitted</th></tr></thead><tbody>' +
      rows.map((n,i) => `<tr class="clickable ${selected===n.id?'active-row':''}" data-i="${i}"><td><b>${fmt.esc(n.name)}</b></td><td>${fmt.esc(n.district||"—")}</td><td>${fmt.day(n.created_at)}</td></tr>`).join("") +
      "</tbody></table>";
    w.querySelectorAll("tr.clickable").forEach((tr) => tr.addEventListener("click", () => open(rows[+tr.dataset.i])));
  }

  async function open(n) {
    selected = n.id; load();
    const p = document.getElementById("panel");
    p.innerHTML = '<div class="card-soft p-3"><div class="spinner-pad">Loading documents…</div></div>';
    const { data: docs } = await sb.from("nursery_documents").select("*").eq("nursery_id", n.id);
    const chips = (docs||[]).length
      ? docs.map((d) => `<button class="btn btn-ghost btn-sm me-2 mb-2" onclick="viewDoc('${d.file_path}')"><i class="bi bi-file-earmark-text"></i> ${fmt.esc(d.type)}</button>`).join("")
      : '<span class="text-muted small">No documents uploaded.</span>';
    p.innerHTML =
      '<div class="card-soft p-4">' +
      `<h5 class="fw-bold mb-1">${fmt.esc(n.name)}</h5>` +
      `<div class="text-muted small mb-3">${fmt.esc(n.district||"—")} · ${fmt.esc(n.phone||"—")}</div>` +
      `<div class="mb-1 fw-semibold small text-uppercase text-muted">Tagline</div><div class="mb-3">${fmt.esc(n.tagline||"—")}</div>` +
      '<div class="fw-semibold small text-uppercase text-muted mb-2">Documents</div>' +
      `<div class="mb-3">${chips}</div>` +
      '<label class="form-label fw-semibold small">Reason / notes (recorded in the audit log)</label>' +
      '<textarea id="reason" class="form-control mb-3" rows="2" placeholder="Optional for approve; recommended for reject"></textarea>' +
      '<div id="perr" class="text-danger small mb-2" style="display:none"></div>' +
      '<div class="d-flex gap-2">' +
      `<button class="btn btn-danger-soft flex-fill" onclick="act('${n.id}','reject_nursery')">Reject</button>` +
      `<button class="btn btn-brand flex-fill" onclick="act('${n.id}','approve_nursery')">Approve &amp; list</button>` +
      "</div></div>";
  }

  async function viewDoc(path) {
    const obj = path.replace(/^kyc\//, "");
    const { data, error } = await sb.storage.from("kyc").createSignedUrl(obj, 60);
    if (error || !data) return alert("Could not open document (not uploaded yet?)");
    window.open(data.signedUrl, "_blank");
  }

  async function act(id, action) {
    const reason = (document.getElementById("reason")||{}).value || "";
    const err = document.getElementById("perr"); err.style.display = "none";
    try { await callFn("admin-action", { action, nurseryId: id, reason }); selected = null; document.getElementById("panel").innerHTML = '<div class="empty">Done ✓</div>'; load(); }
    catch (e) { err.textContent = e.message || "Action failed"; err.style.display = "block"; }
  }
  </script>
</body>
</html>
