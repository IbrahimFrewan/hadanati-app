<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Sign in</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="form">
      <div class="logo"><i class="bi bi-leaf"></i></div>
      <h4 class="fw-bold text-center mb-1">Hadanati Admin</h4>
      <p class="text-muted text-center small mb-4">Sign in to the administration console</p>

      <label class="form-label fw-semibold small">Email</label>
      <input id="email" type="email" class="form-control mb-3 py-2" placeholder="admin@hadanati.test" required />

      <label class="form-label fw-semibold small">Password</label>
      <input id="password" type="password" class="form-control mb-3 py-2" placeholder="••••••••" required />

      <div id="err" class="text-danger small mb-2" style="display:none"></div>
      <button class="btn btn-brand w-100 py-2" id="btn" type="submit">Sign in</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get("denied")) showErr("This account is not an administrator.");
    function showErr(m){ const e=document.getElementById("err"); e.textContent=m; e.style.display="block"; }

    // If already signed in as admin, skip to the dashboard.
    (async () => {
      if (!window.CONFIGURED) { showErr("Set your Supabase keys in assets/js/config.js"); return; }
      const { data:{ session } } = await sb.auth.getSession();
      if (session) {
        const { data: p } = await sb.from("profiles").select("role").eq("id", session.user.id).single();
        if (p && p.role === "admin") location.replace("index.html");
      }
    })();

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn");
      document.getElementById("err").style.display = "none";
      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        const { data: prof } = await sb.from("profiles").select("role").eq("id", data.user.id).single();
        if (!prof || prof.role !== "admin") { await sb.auth.signOut(); throw new Error("This account is not an administrator."); }
        location.replace("index.html");
      } catch (e) {
        const msg = (e && (e.message || e.error_description || e.error)) ||
          (typeof e === "string" ? e : JSON.stringify(e));
        showErr(msg && msg !== "{}" ? msg : "Sign-in failed — check email/password, or that the account is confirmed.");
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
