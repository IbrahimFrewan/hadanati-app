<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Bookings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main">
      <div class="page-head mb-4"><h1>Bookings</h1><p>Recent bookings across the platform.</p></div>
      <div class="table-wrap" id="wrap"><div class="spinner-pad">Loading…</div></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
  (async()=>{ renderSidebar("bookings"); await requireAdmin(); load(); })().catch(()=>{});
  async function load(){
    loading("wrap");
    const { data, error }=await sb.from("bookings")
      .select("id,type,status,price,unit,created_at,nurseries(name),profiles!bookings_parent_id_fkey(full_name)")
      .order("created_at",{ascending:false}).limit(200);
    const w=document.getElementById("wrap");
    if(error) return errBox("wrap",error.message);
    const rows=data||[];
    if(!rows.length){ w.innerHTML='<div class="empty">No bookings yet.</div>'; return; }
    w.innerHTML='<table class="tbl"><thead><tr><th>Nursery</th><th>Parent</th><th>Type</th><th>Price</th><th>Status</th><th>Created</th></tr></thead><tbody>'+
      rows.map(b=>`<tr><td><b>${fmt.esc(b.nurseries?.name||"—")}</b></td><td>${fmt.esc(b.profiles?.full_name||"—")}</td><td>${fmt.esc(b.type)}</td><td>${fmt.jod(b.price)} / ${fmt.esc(b.unit)}</td><td>${badge(b.status)}</td><td>${fmt.day(b.created_at)}</td></tr>`).join("")+
      "</tbody></table>";
  }
  </script>
</body>
</html>
