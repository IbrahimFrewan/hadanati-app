<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Nurseries</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main">
      <div class="page-head d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
        <div><h1>Nurseries</h1><p>All registered nurseries.</p></div>
        <input id="q" class="form-control" style="max-width:260px" placeholder="Search name or district…" />
      </div>
      <div class="table-wrap" id="wrap"><div class="spinner-pad">Loading…</div></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
  let all = [];
  (async () => { renderSidebar("nurseries"); await requireAdmin(); load(); document.getElementById("q").addEventListener("input", render); })().catch(()=>{});
  async function load(){ loading("wrap"); const { data, error } = await sb.from("nurseries").select("*").order("created_at",{ascending:false}); if(error) return errBox("wrap",error.message); all=data||[]; render(); }
  function render(){
    const q=(document.getElementById("q").value||"").toLowerCase();
    const rows=all.filter(n=>!q||n.name.toLowerCase().includes(q)||(n.district||"").toLowerCase().includes(q));
    const w=document.getElementById("wrap");
    if(!rows.length){ w.innerHTML='<div class="empty">No nurseries found.</div>'; return; }
    w.innerHTML='<table class="tbl"><thead><tr><th>Name</th><th>District</th><th>Rating</th><th>Listed</th><th>Status</th><th>Joined</th><th></th></tr></thead><tbody>'+
      rows.map(n=>`<tr><td><b>${fmt.esc(n.name)}</b></td><td>${fmt.esc(n.district||"—")}</td><td>${n.rating?("★ "+n.rating+" ("+n.reviews_count+")"):"—"}</td><td>${n.listed?"Yes":"No"}</td><td>${badge(n.status)}</td><td>${fmt.day(n.created_at)}</td><td class="text-end">${(n.status==="approved"||n.status==="suspended")?`<button class="btn btn-ghost btn-sm" onclick="toggle('${n.id}','${n.status}')">${n.status==="approved"?"Suspend":"Reactivate"}</button>`:""}</td></tr>`).join("")+
      "</tbody></table>";
  }
  async function toggle(id,status){ try{ await callFn("admin-action",{ action: status==="approved"?"suspend_nursery":"reactivate_nursery", nurseryId:id }); load(); }catch(e){ alert(e.message); } }
  </script>
</body>
</html>
