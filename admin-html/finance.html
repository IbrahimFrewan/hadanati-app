<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Finance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main">
      <div class="page-head d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
        <div><h1>Finance</h1><p>Payments &amp; monthly settlements.</p></div>
        <button class="btn btn-brand" id="run"><i class="bi bi-arrow-repeat"></i> Run monthly payouts</button>
      </div>
      <div id="notice"></div>
      <div class="stat-grid mb-4" id="stats"></div>
      <div class="section-title">Recent payments</div>
      <div class="table-wrap mb-4" id="payWrap"><div class="spinner-pad">Loading…</div></div>
      <div class="section-title">Payouts</div>
      <div class="table-wrap" id="poWrap"><div class="spinner-pad">Loading…</div></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
  (async()=>{ renderSidebar("finance"); await requireAdmin(); load();
    document.getElementById("run").addEventListener("click", runPayouts); })().catch(()=>{});
  async function load(){
    const [pay,po]=await Promise.all([
      sb.from("payments").select("*").order("created_at",{ascending:false}).limit(100),
      sb.from("payouts").select("*").order("period_end",{ascending:false}).limit(50),
    ]);
    const payments=pay.data||[], payouts=po.data||[];
    const fees=payments.filter(p=>p.status==="captured").reduce((a,p)=>a+Number(p.service_fee),0);
    const stat=(v,l)=>`<div class="card-soft"><div class="stat"><div class="ic"><i class="bi bi-wallet2"></i></div><div><div class="v">${v}</div><div class="l">${l}</div></div></div></div>`;
    document.getElementById("stats").innerHTML=stat(fmt.jod(fees),"Platform fees (captured)")+stat(payments.length,"Payments shown")+stat(payouts.length,"Payout runs");
    document.getElementById("payWrap").innerHTML = !payments.length ? '<div class="empty">No payments yet.</div>' :
      '<table class="tbl"><thead><tr><th>Amount</th><th>Fee</th><th>Net</th><th>Method</th><th>Status</th><th>Date</th></tr></thead><tbody>'+
      payments.map(p=>`<tr><td>${fmt.jod(p.amount)}</td><td>${fmt.jod(p.service_fee)}</td><td>${fmt.jod(p.net_amount)}</td><td>${fmt.esc(p.method)}</td><td>${badge(p.status)}</td><td>${fmt.day(p.created_at)}</td></tr>`).join("")+"</tbody></table>";
    document.getElementById("poWrap").innerHTML = !payouts.length ? '<div class="empty">No payouts yet.</div>' :
      '<table class="tbl"><thead><tr><th>Period</th><th>Gross</th><th>Fees</th><th>Net</th><th>Status</th></tr></thead><tbody>'+
      payouts.map(p=>`<tr><td>${fmt.day(p.period_start)} – ${fmt.day(p.period_end)}</td><td>${fmt.jod(p.gross)}</td><td>${fmt.jod(p.fees)}</td><td>${fmt.jod(p.net)}</td><td>${badge(p.status)}</td></tr>`).join("")+"</tbody></table>";
  }
  async function runPayouts(){
    const btn=document.getElementById("run"); btn.disabled=true; const old=btn.innerHTML; btn.textContent="Running…";
    const n=document.getElementById("notice");
    try{ const res=await callFn("run-payouts",{}); n.innerHTML=`<div class="alert alert-success">Payout run complete — ${res?.payouts?.length||0} nursery payout(s) created.</div>`; load(); }
    catch(e){ n.innerHTML=`<div class="alert alert-danger">${fmt.esc(e.message||"Run failed")}</div>`; }
    finally{ btn.disabled=false; btn.innerHTML=old; }
  }
  </script>
</body>
</html>
