<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Audit log</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main">
      <div class="page-head mb-4"><h1>Audit log</h1><p>Immutable record of administrative actions.</p></div>
      <div class="table-wrap" id="wrap"><div class="spinner-pad">Loading…</div></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
  (async()=>{ renderSidebar("audit"); await requireAdmin(); load(); })().catch(()=>{});
  async function load(){
    loading("wrap");
    const { data, error }=await sb.from("audit_log").select("*").order("created_at",{ascending:false}).limit(200);
    const w=document.getElementById("wrap");
    if(error) return errBox("wrap",error.message);
    const rows=data||[];
    if(!rows.length){ w.innerHTML='<div class="empty">No actions recorded yet.</div>'; return; }
    w.innerHTML='<table class="tbl"><thead><tr><th>When</th><th>Action</th><th>Entity</th><th>Details</th></tr></thead><tbody>'+
      rows.map(a=>`<tr><td>${fmt.date(a.created_at)}</td><td><code>${fmt.esc(a.action)}</code></td><td>${fmt.esc(a.entity)}</td><td class="text-muted small">${a.meta&&Object.keys(a.meta).length?fmt.esc(JSON.stringify(a.meta)):"—"}</td></tr>`).join("")+
      "</tbody></table>";
  }
  </script>
</body>
</html>
