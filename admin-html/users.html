<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hadanati Admin — Users</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="assets/css/styles.css" rel="stylesheet" />
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar"></aside>
    <main class="main">
      <div class="page-head d-flex justify-content-between align-items-end flex-wrap gap-2 mb-4">
        <div><h1>Users</h1><p>Parents, nursery owners, and admins.</p></div>
        <select id="role" class="form-select" style="max-width:200px">
          <option value="all">All roles</option><option value="parent">Parents</option>
          <option value="nursery_owner">Nursery owners</option><option value="admin">Admins</option>
        </select>
      </div>
      <div class="table-wrap" id="wrap"><div class="spinner-pad">Loading…</div></div>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
  let all=[];
  (async()=>{ renderSidebar("users"); await requireAdmin(); load(); document.getElementById("role").addEventListener("change",render); })().catch(()=>{});
  async function load(){ loading("wrap"); const { data, error }=await sb.from("profiles").select("id,role,full_name,phone,email,status,created_at").order("created_at",{ascending:false}); if(error) return errBox("wrap",error.message); all=data||[]; render(); }
  function render(){
    const r=document.getElementById("role").value;
    const rows=all.filter(u=>r==="all"||u.role===r);
    const w=document.getElementById("wrap");
    if(!rows.length){ w.innerHTML='<div class="empty">No users found.</div>'; return; }
    w.innerHTML='<table class="tbl"><thead><tr><th>Name</th><th>Role</th><th>Phone</th><th>Email</th><th>Status</th><th>Joined</th><th></th></tr></thead><tbody>'+
      rows.map(u=>`<tr><td><div class="d-flex align-items-center gap-2"><div class="avatar">${fmt.initials(u.full_name)}</div><b>${fmt.esc(u.full_name||"—")}</b></div></td><td>${fmt.esc(u.role)}</td><td>${fmt.esc(u.phone||"—")}</td><td>${fmt.esc(u.email||"—")}</td><td>${badge(u.status)}</td><td>${fmt.day(u.created_at)}</td><td class="text-end">${u.role!=="admin"?`<button class="btn btn-ghost btn-sm" onclick="setStatus('${u.id}','${u.status==="active"?"suspended":"active"}')">${u.status==="active"?"Suspend":"Reactivate"}</button>`:""}</td></tr>`).join("")+
      "</tbody></table>";
  }
  async function setStatus(userId,status){ try{ await callFn("admin-action",{action:"set_user_status",userId,status}); load(); }catch(e){ alert(e.message); } }
  </script>
</body>
</html>
