<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>حضانتي · Parent App — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  html, body { margin: 0; padding: 0; background: #efece4; font-family: Rubik, sans-serif; }
  ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

  .page { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 28px 0; }
  .cap { font-family: 'Baloo 2', cursive; font-weight: 700; font-size: 15px; color: #2f5e41; }
  .phone {
    width: 390px; height: 844px; background: #fff; border-radius: 34px; overflow: hidden;
    position: relative; color: #243528; display: flex; flex-direction: column;
    box-shadow: 0 14px 40px -16px #2b3a2e55; border: 1px solid #e9e3d4;
  }
  .cover { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 844px; gap: 8px; }
  .cover-badge { font-family: 'Baloo 2', cursive; font-weight: 800; font-size: 34px; color: #2f5e41; background: #f4f0e6; border-radius: 22px; padding: 14px 26px; }
  .cover h1 { font-family: 'Baloo 2', cursive; font-size: 40px; color: #243528; margin: 14px 0 0; }
  .cover p { font-size: 15px; color: #7c8579; margin: 0; }

  @media print {
    @page { size: portrait; margin: 0.6cm; }
    html, body { background: #fff; }
    *, *::before, *::after {
      -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important;
      animation-delay: -99s !important; animation-duration: .001s !important;
      animation-iteration-count: 1 !important; animation-fill-mode: both !important;
      animation-play-state: running !important; transition-duration: 0s !important;
    }
    .page { padding: 0; break-after: page; break-inside: avoid; height: auto; justify-content: center; }
    .cover { break-after: page; }
    .phone { box-shadow: none; border: 1px solid #d8d2c2; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="helpers/icons.jsx"></script>
<script type="text/babel" src="helpers/data.jsx"></script>
<script type="text/babel" src="helpers/motifs.jsx"></script>
<script type="text/babel" src="helpers/backdrop.jsx"></script>
<script type="text/babel" src="helpers/shell.jsx"></script>
<script type="text/babel" src="parent-app/ds.jsx"></script>
<script type="text/babel" src="parent-app/cards.jsx"></script>
<script type="text/babel" src="parent-app/screens-onboard.jsx"></script>
<script type="text/babel" src="parent-app/screens-home.jsx"></script>
<script type="text/babel" src="parent-app/screens-browse.jsx"></script>
<script type="text/babel" src="parent-app/screens-nursery.jsx"></script>
<script type="text/babel" src="parent-app/screens-booking.jsx"></script>
<script type="text/babel" src="parent-app/screens-bookings.jsx"></script>
<script type="text/babel" src="parent-app/screens-children.jsx"></script>
<script type="text/babel" src="parent-app/screens-reports.jsx"></script>
<script type="text/babel" src="parent-app/screens-comms.jsx"></script>
<script type="text/babel" src="parent-app/screens-account.jsx"></script>
<script type="text/babel" src="parent-app/app.jsx"></script>
<script type="text/babel" src="parent-app/print.jsx"></script>

<script type="text/babel" data-presets="react">
  ReactDOM.createRoot(document.getElementById("root")).render(<window.PrintDeck />);

  // Auto-print once fonts + images have settled.
  (async function () {
    const waitImages = () => {
      const imgs = [...document.images];
      return Promise.all(imgs.map((im) => im.complete ? Promise.resolve() : new Promise((res) => { im.onload = im.onerror = res; })));
    };
    try { await (document.fonts ? document.fonts.ready : Promise.resolve()); } catch (e) {}
    // give React a tick to mount all phones, then wait for images
    await new Promise((r) => setTimeout(r, 600));
    await waitImages();
    await new Promise((r) => setTimeout(r, 700));
    // Only auto-print when opened as a real top-level tab (open_for_print),
    // never inside the in-app preview iframe.
    if (window.self === window.top && !window.__noprint) window.print();
  })();
</script>
</body>
</html>
