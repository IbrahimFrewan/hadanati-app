name: Build Android APKs (EAS)

# Builds APKs for BOTH apps on Expo's EAS servers, then downloads each APK and
# uploads it as a GitHub artifact. Requires the repo secret EXPO_TOKEN.
# Manual trigger only (to control EAS build quota).

on:
  workflow_dispatch:

concurrency:
  group: build-apk-eas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app: [HadanatiApp, NurseryApp]
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check EXPO_TOKEN is set
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is missing. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Ensure EAS project is initialized
        working-directory: ${{ matrix.app }}
        run: eas init --non-interactive --force || true

      # Submit to EAS WITHOUT waiting — EAS free-tier queues can exceed the
      # runner's time limit. The build continues on Expo's servers; download the
      # APK from the build page printed below (and in the run Summary).
      - name: Submit EAS build (Android APK, profile=preview)
        working-directory: ${{ matrix.app }}
        run: |
          eas build --platform android --profile preview --non-interactive --no-wait 2>&1 | tee /tmp/eas.log
          URL=$(grep -oE 'https://expo\.dev/[^ ]+/builds/[a-f0-9-]+' /tmp/eas.log | head -1)
          [ -n "$URL" ] || URL=$(grep -oE 'https://expo\.dev[^ ]+' /tmp/eas.log | head -1)
          echo "## ${{ matrix.app }} — EAS Android build submitted ✅" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress and download the **.apk** here when it finishes:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
          echo "::notice title=EAS build (${{ matrix.app }})::$URL"
