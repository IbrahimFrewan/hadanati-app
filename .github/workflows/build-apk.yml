name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: HadanatiApp/package-lock.json

      - name: Install dependencies
        working-directory: HadanatiApp
        run: npm install

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Verify token
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas whoami

      - name: Initialize EAS project
        working-directory: HadanatiApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas init --non-interactive --force || true

      # --- Key change #1: wait for the build instead of --no-wait, and capture the APK URL ---
      - name: Build APK and capture URL
        id: build
        working-directory: HadanatiApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # --wait blocks until the build finishes; --json gives us a machine-readable result
          BUILD_JSON=$(eas build --platform android --profile preview --non-interactive --wait --json)
          echo "$BUILD_JSON" > build-result.json
          # Extract the artifact download URL from the JSON (first build object)
          APK_URL=$(node -e "const b=require('./build-result.json'); const u=(Array.isArray(b)?b[0]:b)?.artifacts?.buildUrl || (Array.isArray(b)?b[0]:b)?.artifacts?.applicationArchiveUrl; if(!u){console.error('No APK URL found'); process.exit(1)} console.log(u)")
          echo "apk_url=$APK_URL" >> "$GITHUB_OUTPUT"
          echo "APK URL: $APK_URL"

      # --- Key change #2: download the APK file from the EAS URL onto the runner ---
      - name: Download APK
        working-directory: HadanatiApp
        run: |
          curl -L -o hadanati.apk "${{ steps.build.outputs.apk_url }}"
          ls -lh hadanati.apk

      # --- Key change #3: upload it as a GitHub Actions artifact (downloadable from the run page) ---
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hadanati-apk
          path: HadanatiApp/hadanati.apk
          retention-days: 30

      # --- Optional: also publish it as a GitHub Release asset (gives a permanent public download link) ---
      # Comment this whole step out if you don't want public releases.
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Hadanati APK build ${{ github.run_number }}
          files: HadanatiApp/hadanati.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
