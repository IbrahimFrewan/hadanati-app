name: Build Android APKs (EAS)

# Builds APKs for BOTH apps on Expo's EAS servers, then downloads each APK and
# uploads it as a GitHub artifact. Requires the repo secret EXPO_TOKEN.
# Manual trigger only (to control EAS build quota).

on:
  workflow_dispatch:

concurrency:
  group: build-apk-eas-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        app: [HadanatiApp, NurseryApp]
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check EXPO_TOKEN is set
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error::EXPO_TOKEN secret is missing. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Ensure EAS project is initialized
        working-directory: ${{ matrix.app }}
        run: eas init --non-interactive --force || true

      - name: EAS build (Android APK, profile=preview)
        working-directory: ${{ matrix.app }}
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Resolve APK download URL
        id: url
        working-directory: ${{ matrix.app }}
        run: |
          URL=$(eas build:list --platform android --limit 1 --non-interactive --json \
            | jq -r '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // empty')
          echo "Latest build artifact: $URL"
          if [ -z "$URL" ]; then
            echo "::error title=No APK URL (${{ matrix.app }})::EAS build finished without a downloadable artifact (check the EAS build logs / quota)."
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download APK
        working-directory: ${{ matrix.app }}
        run: |
          curl -L -o "${{ matrix.app }}.apk" "${{ steps.url.outputs.url }}"
          ls -lh "${{ matrix.app }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-apk
          path: ${{ matrix.app }}/${{ matrix.app }}.apk
          retention-days: 30
          if-no-files-found: error
