name: Build Android APKs

# Builds installable APKs for BOTH apps directly on GitHub's runners using
# `expo prebuild` + Gradle — no EAS, no Expo token, no build quota.
# Each APK is uploaded as a downloadable artifact on the run's summary page.
#
# Optional: set repo secrets EXPO_PUBLIC_SUPABASE_URL and
# EXPO_PUBLIC_SUPABASE_ANON_KEY to bake the backend connection into the build.
# Without them the apps build fine and run on local (mock) data.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'HadanatiApp/**'
      - 'NurseryApp/**'
      - '.github/workflows/build-apk.yml'

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        app: [HadanatiApp, NurseryApp]
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
      # Metro's release JS bundling (bundleReleaseJsAndAssets) OOMs/hangs on CI
      # with the default Node heap — give it room.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm install

      - name: Prebuild native Android project
        working-directory: ${{ matrix.app }}
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Build release APK (debug-signed)
        working-directory: ${{ matrix.app }}/android
        run: |
          # Raise Gradle JVM memory (R8/dexing) — last value in the file wins.
          echo "org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1024m" >> gradle.properties
          chmod +x ./gradlew
          set +e
          ./gradlew :app:assembleRelease --no-daemon --stacktrace --max-workers=2 2>&1 | tee /tmp/gradle.log
          code=${PIPESTATUS[0]}
          set -e
          echo "gradle exit=$code"
          # Surface a task/output summary as an annotation (logs are unreachable here).
          summary=$(grep -iE "BUILD SUCCESSFUL|BUILD FAILED|Task :app:.*[Rr]elease|\.apk|\.aab|outputs/|variant|[Ss]igning|bundleReleaseJsAndAssets" /tmp/gradle.log | tail -40 | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::notice title=gradle summary (${{ matrix.app }})::${summary:-none}"
          if [ "$code" != "0" ]; then
            # Capture the whole failure block (from "FAILURE:" onward) so the
            # actual cause — not just "What went wrong:" — is in the annotation.
            err=$(awk '/FAILURE: Build failed with an exception/{f=1} f{print}' /tmp/gradle.log | head -45 | sed ':a;N;$!ba;s/\n/%0A/g')
            echo "::error title=Gradle fail (${{ matrix.app }})::${err}"
            exit 1
          fi

      - name: Locate APK
        if: always()
        run: |
          echo "----- outputs tree -----"
          find ${{ matrix.app }}/android/app/build/outputs -type f 2>/dev/null || echo "(no outputs dir)"
          tree=$(find ${{ matrix.app }}/android/app/build/outputs -type f 2>/dev/null | head -40 | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "::notice title=outputs (${{ matrix.app }})::${tree:-EMPTY}"
          found=$(find ${{ matrix.app }}/android -name '*.apk' 2>/dev/null)
          if [ -z "$found" ]; then
            echo "::error title=No APK (${{ matrix.app }})::assembleRelease produced no .apk under android/"
          else
            echo "::notice title=APK path (${{ matrix.app }})::${found//$'\n'/%0A}"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-apk
          retention-days: 30
          if-no-files-found: error
          path: |
            ${{ matrix.app }}/android/**/*.apk
