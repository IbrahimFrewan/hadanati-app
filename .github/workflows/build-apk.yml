name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: HadanatiApp/package-lock.json

      - name: Install dependencies
        working-directory: HadanatiApp
        run: npm install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: HadanatiApp
        run: eas build --platform android --profile preview --non-interactive

      - name: Get APK URL
        working-directory: HadanatiApp
        run: |
          URL=$(EXPO_TOKEN=${{ secrets.EXPO_TOKEN }} eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "✅ APK ready — download: $URL"
